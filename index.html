<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#12736b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="単価チェッカー" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>単価チェッカー</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon.svg" />
    <link rel="stylesheet" href="styles.css?v=41" />
    <style>
      .app-tabs {
        position: fixed !important;
        left: 50% !important;
        right: auto !important;
        top: auto !important;
        bottom: 10px !important;
        transform: translateX(-50%) !important;
        z-index: 9999 !important;
      }
      @supports (bottom: env(safe-area-inset-bottom)) {
        .app-tabs {
          bottom: calc(10px + env(safe-area-inset-bottom)) !important;
        }
      }
      .app-shell {
        padding-bottom: 112px !important;
      }
    </style>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-camera" viewBox="0 0 24 24">
        <path d="M14.5 5 13 3H8L6.5 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-5.5Z"></path>
        <circle cx="12" cy="12.5" r="3.5"></circle>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"></path>
      </symbol>
      <symbol id="icon-scan" viewBox="0 0 24 24">
        <path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3M7 12h10"></path>
      </symbol>
      <symbol id="icon-shutter" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"></circle>
        <circle cx="12" cy="12" r="3"></circle>
      </symbol>
      <symbol id="icon-history" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5M12 7v5l3 2"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12M7 10l5 5 5-5M5 21h14"></path>
      </symbol>
      <symbol id="icon-save" viewBox="0 0 24 24">
        <path d="M5 3h12l2 2v16H5V3Z"></path>
        <path d="M8 3v6h8V3M8 21v-7h8v7"></path>
      </symbol>
      <symbol id="icon-eraser" viewBox="0 0 24 24">
        <path d="m4 15 8-8a2 2 0 0 1 3 0l4 4a2 2 0 0 1 0 3l-6 6H8l-4-4a1.5 1.5 0 0 1 0-2Z"></path>
        <path d="m9 10 6 6M14 20h7"></path>
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="M4 20h4L19 9a2.1 2.1 0 0 0-3-3L5 17l-1 3Z"></path>
        <path d="m14 7 3 3"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3"></path>
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6 6 18"></path>
      </symbol>
    </svg>

    <header class="app-header">
      <div class="brand-mark" aria-hidden="true">
        <svg><use href="#icon-scan"></use></svg>
      </div>
      <div class="brand-copy">
        <p class="eyebrow">Unit Price Checker</p>
        <h1>単価チェッカー</h1>
      </div>
      <button id="exportCsv" class="icon-button" type="button" title="CSVを書き出す" aria-label="CSVを書き出す">
        <svg><use href="#icon-download"></use></svg>
      </button>
      <button id="refreshApp" class="icon-button" type="button" title="アプリを更新" aria-label="アプリを更新">
        <svg><use href="#icon-history"></use></svg>
      </button>
    </header>

    <nav class="app-tabs" aria-label="画面切り替え">
      <button class="tab-button is-active" type="button" data-tab="check" aria-selected="true">
        <svg><use href="#icon-scan"></use></svg>
        スキャン
      </button>
      <button class="tab-button" type="button" data-tab="history" aria-selected="false">
        <svg><use href="#icon-history"></use></svg>
        履歴
      </button>
    </nav>

    <main class="app-shell">
      <div class="tab-panel is-active" data-panel="check">
        <section class="capture-panel" aria-label="撮影と画像読み取り">
          <button class="camera-frame" type="button" data-action="open-capture-choice" aria-label="画像を撮影または追加">
            <img id="preview" alt="" hidden style="display: none" />
            <span id="emptyPreview" class="empty-preview" aria-label="画像未選択">
              <span class="empty-preview-icon"><svg><use href="#icon-camera"></use></svg></span>
              <strong>画像を撮影/追加</strong>
            </span>
          </button>

          <div id="ocrStatus" class="status" role="status">スキャン結果</div>
        </section>

        <section class="entry-panel" aria-label="商品情報入力">
          <form id="priceForm">
            <div class="form-grid">
              <label>
                種別
                <select id="category" name="category" required>
                  <option>おむつ</option>
                  <option>洗剤</option>
                  <option>柔軟剤</option>
                  <option>おしりふき</option>
                  <option>日用品</option>
                  <option>その他</option>
                </select>
              </label>
              <label>
                商品名
                <input id="productName" name="productName" autocomplete="off" placeholder="例: パンパース さらさらケア" required />
              </label>
              <label>
                サイズ/規格
                <select id="size" name="size" required>
                  <option value="">選択</option>
                  <option>新生児</option>
                  <option>S</option>
                  <option>M</option>
                  <option>L</option>
                  <option>Big</option>
                  <option>Bigより大きい</option>
                  <option>おやすみ</option>
                  <option>本体</option>
                  <option>詰替</option>
                  <option>大容量</option>
                  <option>セット</option>
                  <option>その他</option>
                </select>
              </label>
              <label>
                枚数/容量/個数
                <input id="count" name="count" inputmode="numeric" type="number" min="1" step="1" placeholder="例: 64 / 900" required />
              </label>
              <label>
                店頭価格
                <input id="price" name="price" inputmode="numeric" type="number" min="0" step="1" placeholder="円" required />
              </label>
              <label>
                クーポン値引き
                <input id="coupon" name="coupon" inputmode="numeric" type="number" min="0" step="1" value="0" />
              </label>
              <label>
                CB・ポイント還元
                <input id="cashback" name="cashback" inputmode="numeric" type="number" min="0" step="1" value="0" />
              </label>
              <label>
                店舗・サイト
                <input id="store" name="store" autocomplete="off" placeholder="例: ウエルシア" />
              </label>
              <label>
                購入日
                <input id="date" name="date" type="date" required />
              </label>
            </div>

            <label class="memo-field">
              メモ
              <textarea id="memo" name="memo" rows="3" placeholder="例: 2個購入で追加10%還元"></textarea>
            </label>

            <div class="result-strip">
              <div>
                <span>実質合計</span>
                <strong id="netPrice">0円</strong>
              </div>
              <div class="unit-result">
                <span>1単位単価</span>
                <strong id="unitPrice">0.00円</strong>
              </div>
              <div>
                <span>最安比較</span>
                <strong id="bestCompare">未記録</strong>
              </div>
            </div>

            <div class="form-actions">
              <button id="clearForm" class="secondary" type="button" data-action="clear-form"><svg><use href="#icon-eraser"></use></svg>クリア</button>
              <button id="saveRecord" type="submit"><svg><use href="#icon-save"></use></svg>保存</button>
            </div>
          </form>
        </section>
      </div>

      <div class="tab-panel" data-panel="history" hidden>
        <section class="best-panel" aria-label="最安値">
          <div class="section-title">
            <h2>現在の最安値</h2>
            <select id="filterCategory" aria-label="種別で絞り込み">
              <option value="">全種別</option>
              <option>おむつ</option>
              <option>洗剤</option>
              <option>柔軟剤</option>
              <option>おしりふき</option>
              <option>日用品</option>
              <option>その他</option>
            </select>
            <select id="filterSize" aria-label="サイズで絞り込み">
              <option value="">全規格</option>
              <option>新生児</option>
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>Big</option>
              <option>Bigより大きい</option>
              <option>おやすみ</option>
              <option>本体</option>
              <option>詰替</option>
              <option>大容量</option>
              <option>セット</option>
              <option>その他</option>
            </select>
          </div>
          <div id="bestList" class="best-list"></div>
        </section>

        <section class="history-panel" aria-label="履歴">
          <div class="section-title">
            <h2>履歴</h2>
            <button id="clearHistory" class="danger" type="button" data-action="clear-history"><svg><use href="#icon-trash"></use></svg>全削除</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </div>
    </main>

    <template id="historyItemTemplate">
      <article class="history-item">
        <button class="item-thumb" type="button" aria-label="保存画像を拡大表示">
          <img alt="保存した商品画像" />
          <span>画像なし</span>
        </button>
        <div class="item-date">
          <strong></strong>
          <span></span>
        </div>
        <div class="item-main">
          <h3></h3>
          <div class="item-tags">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="item-note"></p>
        </div>
        <div class="item-price">
          <strong></strong>
          <span></span>
          <div class="item-buttons">
            <button class="edit-history" type="button" title="編集" aria-label="履歴を編集"><svg><use href="#icon-edit"></use></svg></button>
            <button class="delete-history" type="button" title="削除" aria-label="履歴を削除"><svg><use href="#icon-trash"></use></svg></button>
          </div>
        </div>
      </article>
    </template>

    <div id="imageViewer" class="image-viewer" hidden>
      <button class="image-viewer-backdrop" type="button" data-action="close-viewer" aria-label="画像を閉じる"></button>
      <div class="image-viewer-panel" role="dialog" aria-modal="true" aria-label="保存画像の拡大表示">
        <button class="image-viewer-close" type="button" data-action="close-viewer" aria-label="閉じる">
          <svg><use href="#icon-close"></use></svg>
        </button>
        <img id="viewerImage" alt="保存した商品画像の拡大表示" />
      </div>
    </div>

    <div id="captureChooser" class="capture-chooser" hidden>
      <button class="capture-chooser-backdrop" type="button" data-action="close-capture-choice" aria-label="選択を閉じる"></button>
      <div class="capture-chooser-panel" role="dialog" aria-modal="true" aria-label="画像の追加方法を選択">
        <button type="button" data-action="choose-camera"><svg><use href="#icon-camera"></use></svg>カメラで撮影</button>
        <button type="button" data-action="choose-image"><svg><use href="#icon-plus"></use></svg>画像を選択</button>
      </div>
    </div>

    <input id="nativeCameraInput" class="hidden-file-input" type="file" accept="image/*" capture="environment" />
    <input id="imageInput" class="hidden-file-input" type="file" accept="image/*" />

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
